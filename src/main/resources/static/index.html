<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Perros Registrados</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=&libraries=places"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .total-perros {
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .total-perros h2 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .total-perros p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 20px;
        }

        .search-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .search-section h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .search-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.3s ease;
        }

        .search-button:hover {
            transform: translateY(-2px);
        }

        .perros-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .perro-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            border-left: 4px solid #667eea;
        }

        .perro-card h4 {
            color: #667eea;
            margin-bottom: 8px;
        }

        .perro-info {
            font-size: 0.9rem;
            color: #666;
        }

        .map-container {
            height: 400px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .search-form {
                flex-direction: column;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐕 Dashboard de Perros Registrados</h1>
            <p>Estadísticas generales del registro canino municipal</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card total-perros">
                <h2 id="totalPerros">-</h2>
                <p>Total de Perros Registrados</p>
            </div>
            
            <div class="stat-card">
                <h3>Perros por Raza</h3>
                <div class="chart-container">
                    <canvas id="razaChart"></canvas>
                </div>
            </div>
            
            <div class="stat-card">
                <h3>Perros por Edad</h3>
                <div class="chart-container">
                    <canvas id="edadChart"></canvas>
                </div>
            </div>
        </div>

        <div class="search-section">
            <h3>🔍 Buscar Perros por Dueño</h3>
            <div class="search-form">
                <input type="text" id="duenioInput" class="search-input" placeholder="Ingrese el nombre del dueño...">
                <button onclick="buscarPerrosPorDuenio()" class="search-button">Buscar</button>
            </div>
            <div id="perrosResultado"></div>
        </div>

        <div class="stat-card">
            <h3>🗺️ Densidad Canina por Ubicación</h3>
            <div id="map" class="map-container"></div>
        </div>
    </div>

    <script>
        let razaChart, edadChart, map;

        // Cargar estadísticas al iniciar
        document.addEventListener('DOMContentLoaded', function() {
            cargarEstadisticas();
            inicializarMapa();
        });

        async function cargarEstadisticas() {
            try {
                const response = await fetch('/api/dashboard/estadisticas');
                const data = await response.json();
                
                mostrarTotalPerros(data.totalPerros);
                crearGraficoRaza(data.perrosPorRaza);
                crearGraficoEdad(data.perrosPorEdad);
                actualizarMapa(data.perrosPorUbicacion);
                
            } catch (error) {
                console.error('Error al cargar estadísticas:', error);
                mostrarError('Error al cargar las estadísticas');
            }
        }

        function mostrarTotalPerros(total) {
            document.getElementById('totalPerros').textContent = total;
        }

        function crearGraficoRaza(datosRaza) {
            const ctx = document.getElementById('razaChart').getContext('2d');
            
            if (razaChart) {
                razaChart.destroy();
            }

            razaChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: datosRaza.map(d => d.raza),
                    datasets: [{
                        data: datosRaza.map(d => d.cantidad),
                        backgroundColor: [
                            '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0',
                            '#9966FF', '#FF9F40', '#FF6384', '#C9CBCF'
                        ],
                        borderWidth: 2,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                usePointStyle: true
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const data = datosRaza[context.dataIndex];
                                    return `${data.raza}: ${data.cantidad} (${data.porcentaje.toFixed(1)}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function crearGraficoEdad(datosEdad) {
            const ctx = document.getElementById('edadChart').getContext('2d');
            
            if (edadChart) {
                edadChart.destroy();
            }

            edadChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: datosEdad.map(d => d.categoria),
                    datasets: [{
                        label: 'Cantidad de Perros',
                        data: datosEdad.map(d => d.cantidad),
                        backgroundColor: 'rgba(102, 126, 234, 0.8)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 2,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    }
                }
            });
        }

        function inicializarMapa() {
            const mapElement = document.getElementById('map');
            map = new google.maps.Map(mapElement, {
                center: { lat: -12.0464, lng: -77.0428 }, // Lima, Perú
                zoom: 12,
                styles: [
                    {
                        featureType: 'poi',
                        elementType: 'labels',
                        stylers: [{ visibility: 'off' }]
                    }
                ]
            });
        }

        function actualizarMapa(datosUbicacion) {
            // Limpiar marcadores existentes
            if (window.markers) {
                window.markers.forEach(marker => marker.setMap(null));
            }
            window.markers = [];

            datosUbicacion.forEach(ubicacion => {
                if (ubicacion.latitud && ubicacion.longitud) {
                    const marker = new google.maps.Marker({
                        position: { lat: ubicacion.latitud, lng: ubicacion.longitud },
                        map: map,
                        title: `${ubicacion.ubicacion}: ${ubicacion.cantidad} perros`,
                        label: {
                            text: ubicacion.cantidad.toString(),
                            color: 'white',
                            fontWeight: 'bold'
                        },
                        icon: {
                            url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
                                <svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="20" cy="20" r="18" fill="#667eea" stroke="white" stroke-width="2"/>
                                    <text x="20" y="25" text-anchor="middle" fill="white" font-size="12" font-weight="bold">🐕</text>
                                </svg>
                            `),
                            scaledSize: new google.maps.Size(40, 40)
                        }
                    });

                    const infoWindow = new google.maps.InfoWindow({
                        content: `
                            <div style="padding: 10px;">
                                <h3 style="margin: 0 0 5px 0; color: #667eea;">${ubicacion.ubicacion}</h3>
                                <p style="margin: 0; font-size: 14px;">${ubicacion.cantidad} perros registrados</p>
                            </div>
                        `
                    });

                    marker.addListener('click', () => {
                        infoWindow.open(map, marker);
                    });

                    window.markers.push(marker);
                }
            });
        }

        async function buscarPerrosPorDuenio() {
            const duenio = document.getElementById('duenioInput').value.trim();
            const resultadoDiv = document.getElementById('perrosResultado');
            
            if (!duenio) {
                resultadoDiv.innerHTML = '<div class="error">Por favor ingrese el nombre del dueño</div>';
                return;
            }

            try {
                resultadoDiv.innerHTML = '<div class="loading">Buscando perros...</div>';
                
                const response = await fetch(`/api/dashboard/perros-duenio?duenio=${encodeURIComponent(duenio)}`);
                const perros = await response.json();
                
                if (perros.length === 0) {
                    resultadoDiv.innerHTML = '<div class="error">No se encontraron perros para este dueño</div>';
                    return;
                }

                const perrosHTML = perros.map(perro => `
                    <div class="perro-card">
                        <h4>${perro.nombre || 'Sin nombre'}</h4>
                        <div class="perro-info">
                            <p><strong>Raza:</strong> ${perro.raza || 'No especificada'}</p>
                            <p><strong>Tamaño:</strong> ${perro.tamano || 'No especificado'}</p>
                            <p><strong>Edad:</strong> ${perro.edad ? perro.edad + ' años' : 'No especificada'}</p>
                            <p><strong>Comportamiento:</strong> ${perro.comportamiento || 'No especificado'}</p>
                            <p><strong>Ubicación:</strong> ${perro.ubicacion || 'No especificada'}</p>
                        </div>
                    </div>
                `).join('');

                resultadoDiv.innerHTML = `
                    <h4 style="margin-bottom: 15px; color: #667eea;">Perros de ${duenio} (${perros.length} encontrados)</h4>
                    <div class="perros-list">
                        ${perrosHTML}
                    </div>
                `;

            } catch (error) {
                console.error('Error al buscar perros:', error);
                resultadoDiv.innerHTML = '<div class="error">Error al buscar perros</div>';
            }
        }

        function mostrarError(mensaje) {
            const container = document.querySelector('.container');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = mensaje;
            container.insertBefore(errorDiv, container.firstChild);
        }

        // Permitir búsqueda con Enter
        document.getElementById('duenioInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                buscarPerrosPorDuenio();
            }
        });
    </script>
</body>
</html>
