server:
  port: 8083

spring:
  application:
    name: dashboard-service
  cloud:
    discovery:
      enabled: true
      service-id: dashboard-service

logging:
  level:
    com.perro.dashboard: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000